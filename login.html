<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealTalent — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:       #0f0d1a;
      --surface:  #1a1630;
      --surface2: #231e40;
      --border:   rgba(160,140,255,0.15);
      --border2:  rgba(160,140,255,0.30);
      --purple:   #a08cff;
      --purple2:  #7b5fff;
      --purple3:  #4f35cc;
      --gold:     #f0c14a;
      --text:     #f0ecff;
      --muted:    #b8b0d8;
      --D: #e05c6a; --I: #f0a047; --S: #3ec98a; --C: #5aabf5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Lato', sans-serif; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    main { width: 100%; max-width: 420px; padding: 4rem 1.5rem 3rem; flex: 1; }

    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
    .brand-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; }
    .brand-title span { color: var(--purple); font-style: italic; }

    .card {
      background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px;
      padding: 1.75rem;
    }

    .mode-switch {
      display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem;
    }
    .mode-btn {
      flex: 1; text-align: center; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 700;
      color: var(--muted); cursor: pointer; border: none; background: transparent; font-family: 'Lato', sans-serif;
      transition: all .15s;
    }
    .mode-btn.active { background: linear-gradient(135deg, var(--purple2), var(--purple3)); color: #fff; }

    .field { text-align: left; margin-bottom: 14px; }
    .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 11px 14px; color: var(--text); font-size: 14px; font-family: 'Lato', sans-serif;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--purple2); }
    .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--purple2), var(--purple3));
      border: none; border-radius: 10px;
      padding: 13px; font-size: 14px; font-weight: 700;
      color: #fff; cursor: pointer; font-family: 'Lato', sans-serif;
      transition: transform 0.15s; box-shadow: 0 8px 24px rgba(123,95,255,0.25);
      margin-top: 6px;
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .6; cursor: default; transform: none; }

    #form-error { color: var(--D); font-size: 13px; margin-top: 12px; min-height: 18px; }
    #form-ok { color: var(--S); font-size: 13px; margin-top: 12px; min-height: 18px; }

    .signup-only { display: none; }
    .signup-mode .signup-only { display: block; }
    .signup-mode .login-only { display: none; }

    footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--muted); opacity: .6; }
  </style>
</head>
<body>

<main>
  <div class="brand">
    <div class="brand-eyebrow">Mapeamento Comportamental</div>
    <div class="brand-title">Real<span>Talent</span></div>
  </div>

  <div class="card" id="auth-card">
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-mode-login" onclick="setMode('login')">Entrar</button>
      <button class="mode-btn" id="btn-mode-signup" onclick="setMode('signup')">Criar conta</button>
    </div>

    <div class="field signup-only">
      <label for="f-nome">Nome completo</label>
      <input type="text" id="f-nome" autocomplete="name" />
    </div>

    <div class="field">
      <label for="f-email">E-mail</label>
      <input type="email" id="f-email" autocomplete="username" />
    </div>

    <div class="field">
      <label for="f-pass">Senha</label>
      <input type="password" id="f-pass" autocomplete="current-password" />
      <div class="field-hint signup-only">Mínimo de 6 caracteres.</div>
    </div>

    <div class="field signup-only">
      <label for="f-time">Seu time</label>
      <select id="f-time">
        <option value="">Carregando times...</option>
      </select>
      <div class="field-hint">Não encontrou seu time? Avise seu líder ou o administrador.</div>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">Entrar</button>
    <div id="form-error"></div>
    <div id="form-ok"></div>
  </div>
</main>

<footer>RealTalent · Powered by Claude (Anthropic)</footer>

<script>
const SUPABASE_URL = 'https://bxdmwdifgpmfybebhxnf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5DNO7W_tqHzgIx60kNqSCw_phh1ZVNf';
let supabaseClient = null;
let currentMode = 'login';

function initSupabase() {
  if (window.supabase && !supabaseClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
}

async function boot() {
  initSupabase();
  if (!supabaseClient) { setTimeout(boot, 150); return; }

  // Se já está logado, redireciona direto
  const { data } = await supabaseClient.auth.getSession();
  if (data && data.session) {
    await routeByRole(data.session.user.id);
    return;
  }

  loadTimes();
}

async function loadTimes() {
  const select = document.getElementById('f-time');
  try {
    const { data, error } = await supabaseClient.from('times').select('id, nome').order('nome');
    if (error) throw error;
    if (!data || data.length === 0) {
      select.innerHTML = '<option value="">Nenhum time cadastrado ainda</option>';
      return;
    }
    select.innerHTML = '<option value="">Selecione...</option>' +
      data.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');
  } catch (e) {
    select.innerHTML = '<option value="">Erro ao carregar times</option>';
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('auth-card').classList.toggle('signup-mode', mode === 'signup');
  document.getElementById('btn-mode-login').classList.toggle('active', mode === 'login');
  document.getElementById('btn-mode-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('submit-btn').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
  document.getElementById('form-error').textContent = '';
  document.getElementById('form-ok').textContent = '';
}

async function handleSubmit() {
  const errEl = document.getElementById('form-error');
  const okEl = document.getElementById('form-ok');
  const btn = document.getElementById('submit-btn');
  errEl.textContent = ''; okEl.textContent = '';

  const email = document.getElementById('f-email').value.trim();
  const pass = document.getElementById('f-pass').value;

  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; return; }

  if (currentMode === 'login') {
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) { errEl.textContent = 'Login inválido. Verifique e-mail e senha.'; return; }
      await routeByRole(data.user.id);
    } catch (e) {
      errEl.textContent = 'Erro ao conectar. Tente novamente.';
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  } else {
    const nome = document.getElementById('f-nome').value.trim();
    const timeId = document.getElementById('f-time').value;
    if (!nome) { errEl.textContent = 'Informe seu nome completo.'; return; }
    if (pass.length < 6) { errEl.textContent = 'A senha precisa ter ao menos 6 caracteres.'; return; }
    if (!timeId) { errEl.textContent = 'Selecione o seu time.'; return; }

    btn.disabled = true; btn.textContent = 'Criando conta...';
    try {
      const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
      if (error) {
        errEl.textContent = error.message.includes('already registered')
