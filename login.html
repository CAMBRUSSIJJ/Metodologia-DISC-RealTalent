<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RealTalent — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0818;
    --purple: #a08cff;
    --purple2: #7b5fff;
    --purple3: #4f35cc;
    --gold: #f0c14a;
    --text: #f0ecff;
    --muted: #9b93c0;
    --border: rgba(255,255,255,0.08);
    --error: #e05c6a;
    --success: #3ec98a;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(123,95,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(79,53,204,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .page-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .btn-back {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    padding: 6px 0;
    margin-bottom: 1.5rem;
    transition: color 0.15s;
    text-decoration: none;
  }
  .btn-back:hover { color: var(--text); }
  .btn-back:hover svg { transform: translateX(-3px); }
  .btn-back svg { transition: transform 0.15s; }
  .logo-wrap { text-align: center; margin-bottom: 2rem; }
  .logo-img {
    height: 90px;
    width: auto;
    filter: drop-shadow(0 8px 32px rgba(123,95,255,0.3));
    animation: logoFloat 4s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  .logo-tagline {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-top: 10px;
  }
  .card {
    width: 100%;
    background: rgba(26,22,48,0.75);
    border: 0.5px solid rgba(160,140,255,0.15);
    border-radius: 20px;
    padding: 2rem;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .mode-switch {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 1.75rem;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, var(--purple2), var(--purple3));
    color: #fff;
    box-shadow: 0 4px 12px rgba(123,95,255,0.3);
  }
  .field { margin-bottom: 16px; }
  .field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    display: block;
    margin-bottom: 7px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .field input, .field select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 15px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--purple2);
    background: rgba(123,95,255,0.08);
  }
  .field input::placeholder { color: rgba(155,147,192,0.4); }
  .field select option { background: #1a1630; }
  .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; opacity: 0.7; }
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--purple2), var(--purple3));
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(123,95,255,0.3);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(123,95,255,0.4); }
  .btn-primary:disabled { opacity: 0.6; cursor: default; transform: none; }
  #form-error { color: var(--error); font-size: 13px; margin-top: 12px; min-height: 18px; }
  #form-ok { color: var(--success); font-size: 13px; margin-top: 12px; min-height: 18px; }
  .signup-only { display: none; }
  .signup-mode .signup-only { display: block; }
  .signup-mode .login-only { display: none; }
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.4;
    position: relative;
    z-index: 1;
    margin-top: 1rem;
  }
</style>
</head>

    <div class="logo-tagline">Mapeamento Comportamental</div>
  </div>

  <div class="card" id="auth-card">
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-mode-login" onclick="setMode('login')">Entrar</button>
      <button class="mode-btn" id="btn-mode-signup" onclick="setMode('signup')">Criar conta</button>
    </div>

    <div class="field signup-only">
      <label for="f-nome">Nome completo</label>
      <input type="text" id="f-nome" autocomplete="name" placeholder="Seu nome completo" />
    </div>

    <div class="field">
      <label for="f-email">E-mail</label>
      <input type="email" id="f-email" autocomplete="username" placeholder="seu@email.com" />
    </div>

    <div class="field">
      <label for="f-pass">Senha</label>
      <input type="password" id="f-pass" autocomplete="current-password" placeholder="••••••••" />
      <div class="field-hint signup-only">Mínimo de 6 caracteres.</div>
    </div>

    <div class="field signup-only">
      <label for="f-time">Seu time</label>
      <select id="f-time">
        <option value="">Carregando times...</option>
      </select>
      <div class="field-hint">Não encontrou seu time? Avise seu líder ou o administrador.</div>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">Entrar</button>
    <div id="form-error"></div>
    <div id="form-ok"></div>
  </div>

</div>

<footer>RealTalent · Powered by Claude (Anthropic)</footer>

<script>

const SUPABASE_URL = 'https://bxdmwdifgpmfybebhxnf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_5DNO7W_tqHzgIx60kNqSCw_phh1ZVNf';
let supabaseClient = null;
let currentMode = 'login';

function initSupabase() {
  if (window.supabase && !supabaseClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
}

async function boot() {
  initSupabase();
  if (!supabaseClient) { setTimeout(boot, 150); return; }

  // Não redireciona automaticamente — usuário precisa fazer login
  loadTimes();
}

async function loadTimes() {
  const select = document.getElementById('f-time');
  try {
    const { data, error } = await supabaseClient.from('times').select('id, nome').order('nome');
    if (error) throw error;
    if (!data || data.length === 0) {
      select.innerHTML = '<option value="">Nenhum time cadastrado ainda</option>';
      return;
    }
    select.innerHTML = '<option value="">Selecione...</option>' +
      data.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');
  } catch (e) {
    select.innerHTML = '<option value="">Erro ao carregar times</option>';
  }
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('auth-card').classList.toggle('signup-mode', mode === 'signup');
  document.getElementById('btn-mode-login').classList.toggle('active', mode === 'login');
  document.getElementById('btn-mode-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('submit-btn').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
  document.getElementById('form-error').textContent = '';
  document.getElementById('form-ok').textContent = '';
}

async function handleSubmit() {
  const errEl = document.getElementById('form-error');
  const okEl = document.getElementById('form-ok');
  const btn = document.getElementById('submit-btn');
  errEl.textContent = ''; okEl.textContent = '';

  const email = document.getElementById('f-email').value.trim();
  const pass = document.getElementById('f-pass').value;

  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; return; }

  if (currentMode === 'login') {
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) { errEl.textContent = 'Login inválido. Verifique e-mail e senha.'; return; }
      await routeByRole(data.user.id);
    } catch (e) {
      errEl.textContent = 'Erro ao conectar. Tente novamente.';
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  } else {
    const nome = document.getElementById('f-nome').value.trim();
    const timeId = document.getElementById('f-time').value;
    if (!nome) { errEl.textContent = 'Informe seu nome completo.'; return; }
    if (pass.length < 6) { errEl.textContent = 'A senha precisa ter ao menos 6 caracteres.'; return; }
    if (!timeId) { errEl.textContent = 'Selecione o seu time.'; return; }

    btn.disabled = true; btn.textContent = 'Criando conta...';
    try {
      const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
      if (error) {
        errEl.textContent = error.message.includes('already registered')
          ? 'Já existe uma conta com este e-mail. Tente entrar.'
          : 'Não foi possível criar a conta. Tente novamente.';
        return;
      }
      const userId = data.user ? data.user.id : (data.session ? data.session.user.id : null);
      if (!userId) {
        okEl.textContent = 'Conta criada. Confirme seu e-mail antes de entrar.';
        return;
      }
      // Cria o perfil vinculado, como colaborador
      const { error: profileError } = await supabaseClient.from('perfis').insert([{
        id: userId, nome, email, papel: 'colaborador', time_id: timeId
      }]);
      if (profileError) {
        console.warn('Erro ao criar perfil:', profileError);
      }
      if (data.session) {
        await routeByRole(userId);
      } else {
        okEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar antes de entrar.';
      }
    } catch (e) {
      errEl.textContent = 'Erro ao conectar. Tente novamente.';
    } finally {
      btn.disabled = false; btn.textContent = 'Criar conta';
    }
  }
}

async function routeByRole(userId) {
  try {
    const { data: perfil, error } = await supabaseClient
      .from('perfis').select('papel').eq('id', userId).maybeSingle();

    sessionStorage.setItem('logado_agora', '1');

    if (error || !perfil) {
      window.location.href = 'index.html';
      return;
    }

    if (perfil.papel === 'admin') window.location.href = 'admin.html';
    else if (perfil.papel === 'lider') window.location.href = 'lider.html';
    else window.location.href = 'index.html';
  } catch (e) {
    sessionStorage.setItem('logado_agora', '1');
    window.location.href = 'index.html';
  }
}

document.getElementById('f-pass').addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });

boot();

</script>
</body>
